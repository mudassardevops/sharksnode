name: Containerized Node App Deployment

on:
  push:
    branches: [ main ]

env:
  IMAGE_VERSION: ${{ github.run_number }}

jobs:
  build:
    runs-on: devopsmolvi

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build . -t mudassarnaseer/webimages:${IMAGE_VERSION}

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Image to Docker Hub
        run: |
          docker push mudassarnaseer/webimages:${IMAGE_VERSION}

      - name: Deploy to Server via SSH
        run: |
          ssh -o StrictHostKeyChecking=no dev@192.168.240.134 << EOF
          echo "${{ secrets.DOCKER_PASS }}" | docker login --username "${{ secrets.DOCKER_USER }}" --password-stdin
          docker pull devopsmolvi/webimages:${IMAGE_VERSION}
          docker stop webserver || true
          docker rm webserver || true
          docker run -d -p 8080:8080 --restart unless-stopped --name webserver devopsmolvi/webimages:${IMAGE_VERSION}
          EOF
